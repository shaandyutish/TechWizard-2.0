<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Studio | Tech Wizard 2.0</title>
    <script>
        // Simple security check for ?admin=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') !== 'true') {
            window.location.href = 'index.html'; // Redirect unauthorized users
        }
    </script>
    <!-- pdf-lib is a powerful library to modify PDFs in the browser -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- JSZip for bulk bundling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- xlsx for Excel/CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- QRCode for verification links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- fontkit is required for embedding custom fonts in pdf-lib -->
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --dark-bg: #050510;
            --dark-card: #0d0d2b;
            --text-primary: #f0eeff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: var(--dark-card);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(180, 79, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--neon-pink);
            font-size: 0.9rem;
        }

        input[type="file"],
        textarea,
        input[type="range"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }

        textarea {
            height: 150px;
            resize: vertical;
            font-family: 'Poppins', sans-serif;
        }

        .preview-pane {
            background: #1a1a3a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 1);
            background: white;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
        }

        .btn-primary:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .style-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .style-btn.active {
            background: var(--neon-cyan);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .style-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type="text"]#font-choice {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🏆 Certificate <span style="color:#fff">Studio</span></h1>

        <div class="studio-grid">
            <!-- Left Side: Controls -->
            <div class="controls">
                <div class="control-group">
                    <label>1. Select Certificate Template (PDF)</label>
                    <input type="file" id="pdf-upload" accept="application/pdf">
                </div>

                <div class="control-group">
                    <label>2. Load Participants (Excel/CSV or Type Names)</label>
                    <div style="display:flex; gap:10px; margin-bottom: 5px;">
                        <input type="file" id="excel-upload" accept=".xlsx, .csv" style="display:none;">
                        <button onclick="document.getElementById('excel-upload').click();" class="btn btn-outline" style="font-size: 0.8rem; padding: 10px;">📊 Upload Excel/CSV</button>
                    </div>
                    <textarea id="name-list" placeholder="John Doe&#10;Jane Smith&#10;Alice Johnson"
                        style="height: 100px;"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="control-group">
                        <label>Issue Date</label>
                        <input type="text" id="issue-date" value="27th March 2026" placeholder="e.g. 27th March 2026">
                    </div>
                    <div class="control-group">
                        <label>Cert ID Prefix</label>
                        <input type="text" id="cert-id-prefix" value="TW.26-" placeholder="e.g. TW.26-">
                    </div>
                </div>

                <div class="control-group"
                    style="border: 2px solid var(--neon-cyan); padding: 15px; border-radius: 12px; margin-top: 10px; background: rgba(0, 245, 255, 0.05);">
                    <label style="color: var(--neon-cyan); font-weight: 700;">🎯 STEP 3: CONFIGURE LAYOUT</label>
                    <div style="margin-bottom: 10px;">
                        <span style="font-size: 0.8rem; color: var(--text-secondary);">Select field to position:</span>
                        <select id="field-selector"
                            style="width: 100%; margin-top: 5px; background: #1a1a3d; border: 1px solid var(--neon-cyan); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer;">
                            <option value="name">📖 1. Participant Name</option>
                            <option value="date">📅 2. Issue Date</option>
                            <option value="id">🆔 3. Verification ID</option>
                            <option value="qr">📲 4. Verification QR Code</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label>3. Font Style (Type to Search)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="font-choice" list="popular-fonts" value="Poppins"
                            placeholder="Search Google Fonts...">
                        <datalist id="popular-fonts">
                            <option value="Poppins">
                            <option value="Montserrat">
                            <option value="Roboto">
                            <option value="Open Sans">
                            <option value="Playfair Display">
                            <option value="Lora">
                            <option value="Oswald">
                            <option value="Raleway">
                            <option value="Merriweather">
                            <option value="Ubuntu">
                            <option value="Inter">
                            <option value="Lato">
                            <option value="Work Sans">
                            <option value="Pacifico">
                            <option value="Great Vibes">
                            <option value="Dancing Script">
                            <option value="Bebas Neue">
                            <option value="Abril Fatface">
                            <option value="Quicksand">
                            <option value="Caveat">
                            <option value="Satisfy">
                        </datalist>
                        <button id="toggle-bold" class="style-btn" title="Bold">B</button>
                        <button id="toggle-italic" class="style-btn" title="Italic">I</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>4. Font Color</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" id="font-color" value="#000000"
                            style="width: 50px; height: 40px; cursor: pointer; padding: 2px;">
                        <input type="text" id="font-color-hex" value="#000000" placeholder="#000000"
                            style="width: 100px; text-transform: uppercase;">
                    </div>
                </div>

                <div class="control-group">
                    <label>5. Vertical Position (Y)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="y-pos" min="0" max="1000" value="450">
                        <input type="number" id="y-pos-num" min="0" max="1000" value="450" style="width:70px;">
                    </div>
                </div>

                <div class="control-group">
                    <label>6. Horizontal Offset (X)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="x-pos" min="-500" max="500" value="0">
                        <input type="number" id="x-pos-num" min="-500" max="500" value="0" style="width:70px;">
                    </div>
                </div>

                <div class="control-group">
                    <label>7. Font Size</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="font-size" min="10" max="150" value="45">
                        <input type="number" id="font-size-num" min="10" max="150" value="45" style="width:70px;">
                    </div>
                </div>

                <div style="background: rgba(0, 245, 255, 0.05); padding: 15px; border-radius: 12px; margin-top: 20px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 0.9rem; color: var(--neon-cyan);">Studio Controls</h4>
                    <button id="generate-btn" class="btn btn-primary"
                        style="width: 100%; font-size: 1.1rem; padding: 15px;">
                        GENERATE & DOWNLOAD ALL PDFS
                    </button>
                    <div id="status" class="status-msg">Upload a template to start.</div>
                </div>
            </div>

            <!-- Right Side: Preview -->
            <div class="preview-pane" id="preview-boundary">
                <canvas id="preview-canvas"></canvas>
                <div id="loading-overlay"
                    style="display:none; position:absolute; background:rgba(0,0,0,0.7); width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    Rendering Preview...
                </div>
            </div>
        </div>

        <div class="btn-group">
            <script>
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const upload = document.getElementById('pdf-upload');
                const generateBtn = document.getElementById('generate-btn');
                const nameList = document.getElementById('name-list');
                const canvas = document.getElementById('preview-canvas');
                const status = document.getElementById('status');

                const ySlider = document.getElementById('y-pos');
                const yNum = document.getElementById('y-pos-num');
                const xSlider = document.getElementById('x-pos');
                const xNum = document.getElementById('x-pos-num');
                const sizeSlider = document.getElementById('font-size');
                const sizeNum = document.getElementById('font-size-num');
        const fieldSelector = document.getElementById('field-selector');
        const issueDateInput = document.getElementById('issue-date');
        const certIdPrefixInput = document.getElementById('cert-id-prefix');
        const excelUpload = document.getElementById('excel-upload');

        let layout = {
            name: { x: 0, y: 450, s: 45 },
            date: { x: 0, y: 650, s: 18 },
            id: { x: 0, y: 720, s: 15 },
            qr: { x: 300, y: 700, s: 80 } // Default QR position and size
        };

        // EXCEL PARSING LOGIC
        excelUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                // Extract first column as names
                const names = rows.map(r => r[0]).filter(n => n && n !== "Name");
                nameList.value = names.join('\n');
                updatePreview();
            };
            reader.readAsBinaryString(file);
        });

        // UNIQUE ID GENERATION (Self-Verifying Hash)
        function generateCertId(name) {
            const prefix = certIdPrefixInput.value;
            // Simple hash for demo verification
            let hash = 0;
            const str = name + "TECHWIZARD_SECRET_KEY"; // Salt for consistency
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return prefix + Math.abs(hash).toString(16).toUpperCase().substring(0, 8);
        }

        // QR CODE GENERATOR (ULTRA-LOW DENSITY FOR MAX SCANNING SIZE)
        async function generateQRImage(text, size) {
            return new Promise((resolve) => {
                const div = document.createElement('div');
                new QRCode(div, {
                    text: text,
                    width: 512, // High resolution master
                    height: 512,
                    correctLevel: QRCode.CorrectLevel.L // Level L (Low) gives the largest modules (fewer dots)
                });
                setTimeout(() => {
                    const img = div.querySelector('img');
                    resolve(img ? img.src : null);
                }, 150);
            });
        }

        function syncInput(slider, num) {
            slider.addEventListener('input', () => {
                num.value = slider.value;
                saveActiveState();
                updatePreview();
            });
            num.addEventListener('input', () => {
                slider.value = num.value;
                saveActiveState();
                updatePreview();
            });
        }

        function saveActiveState() {
            const field = fieldSelector.value;
            layout[field] = {
                x: parseInt(xSlider.value),
                y: parseInt(ySlider.value),
                s: parseInt(sizeSlider.value)
            };
        }

        function loadActiveState() {
            const config = layout[fieldSelector.value];
            xSlider.value = config.x; xNum.value = config.x;
            ySlider.value = config.y; yNum.value = config.y;
            sizeSlider.value = config.s; sizeNum.value = config.s;
            updatePreview();
        }

        fieldSelector.addEventListener('change', loadActiveState);
        [issueDateInput, certIdPrefixInput].forEach(el => el.addEventListener('input', updatePreview));

        syncInput(ySlider, yNum);
        syncInput(xSlider, xNum);
        syncInput(sizeSlider, sizeNum);

        let templateBytes = null;

        const fontChoice = document.getElementById('font-choice');
        const fontColor = document.getElementById('font-color');
        const fontColorHex = document.getElementById('font-color-hex');
        
        const toggleBold = document.getElementById('toggle-bold');
        const toggleItalic = document.getElementById('toggle-italic');

        let isBold = true;
        let isItalic = false;

        toggleBold.classList.toggle('active', isBold);
        toggleBold.onclick = () => { isBold = !isBold; toggleBold.classList.toggle('active', isBold); updatePreview(); };
        toggleItalic.onclick = () => { isItalic = !isItalic; toggleItalic.classList.toggle('active', isItalic); updatePreview(); };

        fontColor.addEventListener('input', () => {
            fontColorHex.value = fontColor.value.toUpperCase();
            updatePreview();
        });
        fontColorHex.addEventListener('input', () => {
            const hex = fontColorHex.value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                fontColor.value = hex;
                updatePreview();
            }
        });

        function hexToPdfRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return rgb(r, g, b);
        }

        async function loadFont() {
            try {
                const baseName = fontChoice.value.trim();
                const cleanName = baseName.replace(/\s+/g, '');
                const repoPath = baseName.toLowerCase().replace(/\s+/g, '');
                let stylePart = "";
                if (isBold && isItalic) stylePart = "BoldItalic";
                else if (isBold) stylePart = "Bold";
                else if (isItalic) stylePart = "Italic";
                else stylePart = (baseName === "Poppins" || baseName === "Roboto") ? "Medium" : "Regular";

                const fontUrl = `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}-${stylePart}.ttf`;
                const fontBytes = await fetch(fontUrl).then(res => {
                    if (!res.ok) throw new Error("Style not available");
                    return res.arrayBuffer();
                });
                return fontBytes;
            } catch (e) {
                return await fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/poppins/Poppins-Medium.ttf').then(res => res.arrayBuffer());
            }
        }

        upload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                templateBytes = await file.arrayBuffer();
                generateBtn.disabled = false;
                updatePreview();
            }
        });

        async function updatePreview() {
            if (!templateBytes) return;
            const names = nameList.value.split('\n').filter(n => n.trim() !== "");
            const testName = names.length > 0 ? names[0] : "SAMPLE NAME";
            const testDate = issueDateInput.value;
            const testId = generateCertId(testName);
            
            // Build absolute URL for verification (Targeting shorter v.html)
            const verifyUrl = `${window.location.origin}${window.location.pathname.replace('cert-gen.html', 'v.html')}?i=${testId}&n=${encodeURIComponent(testName)}`;

            try {
                const pdfDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                pdfDoc.registerFontkit(fontkit);
                const fontBytes = await loadFont();
                let customFont = fontBytes ? await pdfDoc.embedFont(fontBytes) : null;

                const page = pdfDoc.getPages()[0];
                const { width, height } = page.getSize();
                const textColor = hexToPdfRgb(fontColor.value);

                // Drawing Helper
                const drawField = (text, config) => {
                    if (!text) return;
                    const tw = customFont ? customFont.widthOfTextAtSize(text, config.s) : text.length * (config.s * 0.5);
                    const cx = (width / 2) - (tw / 2) + config.x;
                    page.drawText(text, {
                        x: cx,
                        y: height - config.y,
                        size: config.s,
                        font: customFont,
                        color: textColor
                    });
                };

                drawField(testName, layout.name);
                drawField(testDate, layout.date);
                drawField(testId, layout.id);

                // DRAW QR CODE
                const qrBase64 = await generateQRImage(verifyUrl, layout.qr.s);
                if (qrBase64) {
                    const qrImage = await pdfDoc.embedPng(qrBase64);
                    const qx = (width / 2) - (layout.qr.s / 2) + layout.qr.x;
                    page.drawImage(qrImage, {
                        x: qx,
                        y: height - layout.qr.y - layout.qr.s,
                        width: layout.qr.s,
                        height: layout.qr.s
                    });
                }

                const pdfBytes = await pdfDoc.save({ useObjectStreams: false, addDefaultPage: false });
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                renderViaIframe(blobUrl);
                status.innerText = "Preview Updated with QR System!";
            } catch (error) {
                console.error(error);
                status.innerText = "Preview Error: " + error.message;
            }
        }

        function renderViaIframe(url) {
            const boundary = document.getElementById('preview-boundary');
            const oldIframe = boundary.querySelector('iframe');
            if (oldIframe && oldIframe.src.startsWith('blob:')) {
                URL.revokeObjectURL(oldIframe.src);
            }
            boundary.innerHTML = `<iframe src="${url}" style="width:100%; height:500px; border:none; border-radius:12px;"></iframe>`;
        }

        [ySlider, xSlider, sizeSlider, nameList, fontChoice].forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(window.previewTimeout);
                window.previewTimeout = setTimeout(updatePreview, 500);
            });
        });

        generateBtn.addEventListener('click', async () => {
            const names = nameList.value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return alert("Enter names.");

            status.innerText = "🚀 Starting Industrial Mass Generation...";
            generateBtn.disabled = true;
            const zip = new JSZip();

            try {
                const fontBytes = await loadFont();
                const textColor = hexToPdfRgb(fontColor.value);
                
                for (let i = 0; i < names.length; i++) {
                    const name = names[i];
                    const date = issueDateInput.value;
                    const certId = generateCertId(name);
                    const verifyUrl = `${window.location.origin}${window.location.pathname.replace('cert-gen.html', 'v.html')}?i=${certId}&n=${encodeURIComponent(name)}`;
                    
                    status.innerText = `🔄 Processing Cert ${i+1}/${names.length}: ${name}`;

                    const tempDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                    tempDoc.registerFontkit(fontkit);
                    const customFont = fontBytes ? await tempDoc.embedFont(fontBytes) : null;
                    
                    tempDoc.setTitle(`Verified Certificate - ${name}`);
                    tempDoc.setAuthor('Trojan Club');
                    tempDoc.setSubject('Official Tech Wizard 2.0 Credential');

                    const page = tempDoc.getPages()[0];
                    const { width, height } = page.getSize();

                    // DRAWING ALL FIELDS
                    const drawField = (text, config) => {
                        if (!text) return;
                        const tw = customFont ? customFont.widthOfTextAtSize(text, config.s) : text.length * (config.s * 0.5);
                        const cx = (width / 2) - (tw / 2) + config.x;
                        page.drawText(text, { x: cx, y: height - config.y, size: config.s, font: customFont, color: textColor });
                    };

                    drawField(name, layout.name);
                    drawField(date, layout.date);
                    drawField(certId, layout.id);

                    // EMBED QR
                    const qrBase64 = await generateQRImage(verifyUrl, layout.qr.s);
                    if (qrBase64) {
                        const qrImage = await tempDoc.embedPng(qrBase64);
                        const qx = (width / 2) - (layout.qr.s / 2) + layout.qr.x;
                        page.drawImage(qrImage, { x: qx, y: height - layout.qr.y - layout.qr.s, width: layout.qr.s, height: layout.qr.s });
                    }

                    const pdfBytes = await tempDoc.save({ useObjectStreams: false, addDefaultPage: false });
                    zip.file(`TW2_Verified_${name}.pdf`, pdfBytes, {binary: true});
                }
                
                status.innerText = "📦 Finalizing Industrial Package...";
                const zipBlob = await zip.generateAsync({ type: "blob", compression: "STORE" });
                download(zipBlob, "TW2_Verified_Certificates.zip", "application/zip");
                status.innerText = "✅ ALL CERTIFICATES GENERATED SUCCESSFULLY!";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ Generation Error: " + err.message;
            } finally {
                generateBtn.disabled = false;
            }
        });

        function download(data, filename, type) {
            const file = new Blob([data], { type: type });
            const a = document.createElement("a"), url = URL.createObjectURL(file);
            a.href = url; a.download = filename; 
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 0);
        }
            </script>
</body>

</html>
