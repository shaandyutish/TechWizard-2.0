<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Studio | Tech Wizard 2.0</title>
    <script>
        // Simple security check for ?admin=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') !== 'true') {
            window.location.href = 'index.html'; // Redirect unauthorized users
        }
    </script>
    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- FIREBASE CLOUD (GCP) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <!-- fontkit is required for embedding custom fonts in pdf-lib -->
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ui-bg: #0d0d1a;
            --sidebar-bg: #161625;
            --accent-blue: #00aaff;
            --text-dark: #f0f0f0;
            --text-muted: #a0a0b8;
            --border-light: #252538;
        }

        body {
            background-color: var(--ui-bg);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .studio-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* SIDEBAR (RESIZABLE) */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-light);
            padding: 20px;
            overflow-y: auto;
            width: 320px;
            min-width: 250px;
            max-width: 600px;
            flex-shrink: 0;
            transition: transform 0.3s ease, margin-left 0.3s ease;
            position: relative;
        }

        .sidebar.collapsed {
            margin-left: -320px;
            transform: translateX(-100%);
        }

        /* RESIZER BAR */
        .resizer {
            width: 4px;
            cursor: col-resize;
            background: var(--border-light);
            transition: background 0.2s;
            z-index: 100;
            flex-shrink: 0;
            position: relative;
        }

        .resizer:hover,
        .resizer.dragging {
            background: var(--accent-blue);
            width: 6px;
        }

        /* COLLAPSE BUTTON */
        .collapse-btn {
            position: absolute;
            top: 50%;
            left: 320px;
            transform: translateY(-50%);
            width: 24px;
            height: 60px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-light);
            border-left: none;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 8px 8px 0;
            color: var(--accent-blue);
            transition: left 0.3s ease;
        }

        .collapsed+.resizer+.workspace .collapse-btn {
            left: 0;
        }

        /* PREVIEW WORKSPACE */
        .workspace {
            flex-grow: 1;
            padding: 40px;
            background: #050510;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: auto;
            position: relative;
        }

        /* BIG MAIN BUTTON */
        #generate-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: #25253d;
            border: 1px solid var(--border-light);
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.2s;
            border-radius: 4px;
            color: #fff;
        }

        #generate-btn:hover:not(:disabled) {
            background: #1a1a3a;
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
        }

        button.active {
            background: var(--accent-blue) !important;
            color: #000 !important;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        #generate-btn i {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .section-header {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-blue);
            margin: 25px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            background: #0d0d1a;
            border: 1px solid var(--border-light);
            color: #fff;
            border-radius: 4px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            border-color: var(--accent-blue);
            outline: none;
            background: #11112b;
        }

        /* PREVIEW WORKSPACE */
        .workspace {
            padding: 40px;
            background: #050510;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: auto;
        }

        #preview-boundary {
            background: #25253d;
            /* Paper remains white for accuracy */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 850px;
            height: 1100px;
            margin-top: 20px;
            border: 1px solid #333;
        }

        #status {
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--accent-blue);
            font-weight: 600;
        }

        .slider-row {
            display: grid;
            grid-template-columns: 1fr 70px;
            gap: 10px;
            align-items: center;
        }

        input[type="range"] {
            padding: 0;
            accent-color: var(--accent-blue);
        }

        /* CUSTOM FONT DROPDOWN */
        .font-dropdown-wrap {
            position: relative;
        }

        #font-choice {
            cursor: pointer;
        }

        .font-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: #1a1a2e;
            border: 1px solid var(--border-light);
            border-top: none;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .font-option {
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.1rem;
            /* Better for previewing */
            color: #fff;
        }

        .font-option:hover {
            background: var(--accent-blue);
            color: #000 !important;
        }

        .font-option span {
            display: block;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 3px;
        }

        /* FIELD VISIBILITY BY MODE */
        .mode-field-role, .mode-field-date, .mode-field-id { display: none; }
        
        body.mode-coordinator .mode-field-role,
        body.mode-coordinator .mode-field-id { display: block; }

        body.mode-participation .mode-field-date,
        body.mode-participation .mode-field-id { display: block; }

        body.mode-ticket .mode-field-role,
        body.mode-ticket .mode-field-date,
        body.mode-ticket .mode-field-id,
        body.mode-ticket .metadata-header { display: none; }
    </style>
    <!-- PRE-LOAD COMMON PREVIEW FONTS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=Montserrat&family=Cinzel&family=Great+Vibes&family=Playfair+Display&family=Orbitron&family=Pacifico&family=Dancing+Script&family=Sacramento&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="studio-container">
        <div class="sidebar" id="sidebar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Certificate Studio</h1>
                <button onclick="toggleSidebar()"
                    style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <button id="generate-btn">
                <i class="fas fa-file-export"></i>
                <span style="font-size: 0.85rem; font-weight: 600;">Generate</span>
            </button>
            <div id="status">Ready...</div>

            <div class="section-header">Studio Mode</div>
            <div class="control-group">
                <label>Certificate Type:</label>
                <select id="cert-mode" onchange="updateModeUI()">
                    <option value="coordinator">Coordinator (Name, Role, ID, QR)</option>
                    <option value="participation">Participation (Name, Date, ID, QR)</option>
                    <option value="ticket">Entry Ticket (Name, QR Only)</option>
                </select>
            </div>

            <div class="section-header">Template</div>
            <div class="control-group">
                <label>Select PDF:</label>
                <input type="file" id="pdf-upload" accept=".pdf">
            </div>

            <div class="section-header">Participants</div>
            <div class="control-group">
                <label>Upload Excel/CSV:</label>
                <input type="file" id="excel-upload" accept=".xlsx, .csv">
            </div>
            <div class="control-group">
                <label>Name List:</label>
                <textarea id="name-list" rows="3" placeholder="Pasted names..."></textarea>
            </div>

            <div class="section-header metadata-header">Metadata & ID</div>
            <div class="control-group mode-field-role">
                <label>Coordinator Role:</label>
                <input type="text" id="role-input" value="Event Coordinator">
            </div>
            <div class="control-group mode-field-date">
                <label>Issue Date:</label>
                <input type="text" id="issue-date" value="26 March 2026">
            </div>
            <div class="control-group mode-field-id">
                <label>ID Prefix:</label>
                <input type="text" id="cert-id-prefix" value="TW.26-">
            </div>

            <div class="section-header">Layout Settings</div>
            <div class="control-group">
                <label>Active Field:</label>
                <select id="field-selector">
                    <option value="name">Participant Name</option>
                    <option class="mode-field-role" value="role">Coordinator Role</option>
                    <option class="mode-field-date" value="date">Issue Date</option>
                    <option class="mode-field-id" value="id">Verification ID</option>
                    <option value="qr">QR Code</option>
                </select>
            </div>
            <div class="control-group">
                <label>X Position:</label>
                <div class="slider-row">
                    <input type="range" id="x-pos" min="-1000" max="1000" value="0">
                    <input type="number" id="x-pos-num" value="0">
                </div>
            </div>
            <div class="control-group">
                <label>Y Position:</label>
                <div class="slider-row">
                    <input type="range" id="y-pos" min="-1000" max="1000" value="450">
                    <input type="number" id="y-pos-num" value="450">
                </div>
            </div>
            <div class="control-group">
                <label>Size:</label>
                <div class="slider-row">
                    <input type="range" id="font-size" min="1" max="500" value="45">
                    <input type="number" id="font-size-num" value="45">
                </div>
            </div>

            <div class="section-header">Font Style</div>
            <div class="control-group font-dropdown-wrap">
                <label>Visual Font Library:</label>
                <input type="text" id="font-choice" value="Poppins" placeholder="Search fonts..." autocomplete="off">
                <div id="font-results" class="font-results">
                    <!-- PRE-POPULATED BY JS -->
                </div>
            </div>
            <div class="control-group" style="display: flex; gap: 5px;">
                <button id="toggle-bold" style="flex:1; padding: 5px;">B</button>
                <button id="toggle-italic" style="flex:1; padding: 5px;">I</button>
                <input type="color" id="font-color" value="#000000" style="padding: 0; height: 30px; width: 60px;">
                <input type="hidden" id="font-color-hex" value="#000000">
            </div>

            <a href="index.html"
                style="color: var(--accent-blue); display: block; margin-top: 30px; font-size: 0.8rem; text-decoration: none;">←
                Home</a>
        </div>

        <div class="resizer" id="drag-handle"></div>

        <div class="workspace">
            <button class="collapse-btn" id="expand-btn" onclick="toggleSidebar()" style="display:none;">
                <i class="fas fa-chevron-right"></i>
            </button>
            <h2 style="font-size: 1rem; color: #666; font-weight: 500;">Preview</h2>
            <div id="preview-boundary"></div>
        </div>
    </div>

    <div class="btn-group">
        <script>
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const upload = document.getElementById('pdf-upload');
            const generateBtn = document.getElementById('generate-btn');
            const nameList = document.getElementById('name-list');
            const canvas = document.getElementById('preview-canvas');
            const status = document.getElementById('status');

            const ySlider = document.getElementById('y-pos');
            const yNum = document.getElementById('y-pos-num');
            const xSlider = document.getElementById('x-pos');
            const xNum = document.getElementById('x-pos-num');
            const sizeSlider = document.getElementById('font-size');
            const sizeNum = document.getElementById('font-size-num');
            const roleInput = document.getElementById('role-input');
            const fieldSelector = document.getElementById('field-selector');
            const issueDateInput = document.getElementById('issue-date');
            const certIdPrefixInput = document.getElementById('cert-id-prefix');
            const excelUpload = document.getElementById('excel-upload');
            const certMode = document.getElementById('cert-mode');

            function updateModeUI() {
                const mode = certMode.value;
                document.body.className = `mode-${mode}`;
                
                // Auto-switch field selector if currently hidden
                const currentField = fieldSelector.value;
                if ((mode === 'ticket' && (currentField === 'role' || currentField === 'date' || currentField === 'id')) ||
                    (mode === 'participation' && currentField === 'role') ||
                    (mode === 'coordinator' && currentField === 'date')) {
                    fieldSelector.value = 'name';
                    loadActiveState();
                }
                updatePreview();
            }
            // Init mode UI
            window.addEventListener('DOMContentLoaded', updateModeUI);

            // ELEMENT POSITION STATE
            let layout = {
                name: { x: 0, y: 450, s: 45 },
                role: { x: 0, y: 550, s: 24 },
                date: { x: 0, y: 650, s: 18 },
                id: { x: 0, y: 720, s: 15 },
                qr: { x: 300, y: 700, s: 80 }
            };

            // EXCEL PARSING LOGIC
            excelUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    // Extract first column as names
                    const names = rows.map(r => r[0]).filter(n => n && n !== "Name");
                    nameList.value = names.join('\n');
                    updatePreview();
                };
                reader.readAsBinaryString(file);
            });

            // -------------------------------------------------------------------
            // CLOUD (GCP) INITIALIZATION
            // -------------------------------------------------------------------
            // TODO: Replace with your actual config from Phase 3 of the guide!
            const firebaseConfig = {
                apiKey: "AIzaSyDPYXHwl4i0gNWJEzHwaN9UdesBdSwWQKU",
                authDomain: "tech-wizard-certificates.firebaseapp.com",
                projectId: "tech-wizard-certificates",
                storageBucket: "tech-wizard-certificates.firebasestorage.app",
                messagingSenderId: "1058371501731",
                appId: "1:1058371501731:web:0d3c8cde0086e0027a0916"
            };

            let db;
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("☁️ GCP Firestore Initialized!");
            } catch (e) {
                console.warn("⚠️ Firebase keys missing. Cloud Sync is disabled.");
            }

            // 20-CHARACTER CRYPTOGRAPHIC ID GENERATOR (Non-Reusable)
            function generateUniqueId() {
                const array = new Uint8Array(10);
                window.crypto.getRandomValues(array);
                return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
            }

            // QR CODE GENERATOR (ULTRA-LOW DENSITY FOR MAX SCANNING SIZE)
            async function generateQRImage(text, size) {
                return new Promise((resolve) => {
                    const div = document.createElement('div');
                    new QRCode(div, {
                        text: text,
                        width: 512, // High resolution master
                        height: 512,
                        correctLevel: QRCode.CorrectLevel.L // Level L (Low) gives the largest modules (fewer dots)
                    });
                    setTimeout(() => {
                        const img = div.querySelector('img');
                        resolve(img ? img.src : null);
                    }, 150);
                });
            }

            function syncInput(slider, num) {
                slider.addEventListener('input', () => {
                    num.value = slider.value;
                    saveActiveState();
                    updatePreview();
                });
                num.addEventListener('input', () => {
                    slider.value = num.value;
                    saveActiveState();
                    updatePreview();
                });
            }

            function saveActiveState() {
                const field = fieldSelector.value;
                layout[field] = {
                    x: parseInt(xSlider.value),
                    y: parseInt(ySlider.value),
                    s: parseInt(sizeSlider.value)
                };
            }

            function loadActiveState() {
                const config = layout[fieldSelector.value];
                xSlider.value = config.x; xNum.value = config.x;
                ySlider.value = config.y; yNum.value = config.y;
                sizeSlider.value = config.s; sizeNum.value = config.s;
                updatePreview();
            }

            fieldSelector.addEventListener('change', loadActiveState);
            [issueDateInput, certIdPrefixInput].forEach(el => el.addEventListener('input', updatePreview));

            syncInput(ySlider, yNum);
            syncInput(xSlider, xNum);
            syncInput(sizeSlider, sizeNum);

            let templateBytes = null;

            const fontChoice = document.getElementById('font-choice');
            const fontColor = document.getElementById('font-color');
            const fontColorHex = document.getElementById('font-color-hex');

            const toggleBold = document.getElementById('toggle-bold');
            const toggleItalic = document.getElementById('toggle-italic');

            let isBold = true;
            let isItalic = false;

            toggleBold.classList.toggle('active', isBold);
            toggleBold.onclick = () => { isBold = !isBold; toggleBold.classList.toggle('active', isBold); updatePreview(); };
            toggleItalic.onclick = () => { isItalic = !isItalic; toggleItalic.classList.toggle('active', isItalic); updatePreview(); };

            fontColor.addEventListener('input', () => {
                fontColorHex.value = fontColor.value.toUpperCase();
                updatePreview();
            });
            fontColorHex.addEventListener('input', () => {
                const hex = fontColorHex.value;
                if (/^#[0-9A-F]{6}$/i.test(hex)) {
                    fontColor.value = hex;
                    updatePreview();
                }
            });

            function hexToPdfRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16) / 255;
                const g = parseInt(hex.slice(3, 5), 16) / 255;
                const b = parseInt(hex.slice(5, 7), 16) / 255;
                return rgb(r, g, b);
            }

            async function loadFont() {
                try {
                    const baseName = fontChoice.value.trim();
                    const cleanName = baseName.replace(/\s+/g, '');
                    const repoPath = baseName.toLowerCase().replace(/\s+/g, '');
                    
                    // Construct Style Part
                    let stylePart = "Regular";
                    if (isBold && isItalic) stylePart = "BoldItalic";
                    else if (isBold) stylePart = "Bold";
                    else if (isItalic) stylePart = "Italic";
                    else if (baseName === "Poppins" || baseName === "Roboto") stylePart = "Medium";

                    // SMARTER FILENAME RESOLVER
                    const fontPaths = [
                        // Strategy 1: Styled Static subfolder
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/static/${cleanName}-${stylePart}.ttf`,
                        // Strategy 2: Styled Direct folder
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}-${stylePart}.ttf`,
                        // Strategy 3: Regular Static Fallback (if Bold/Italic missing)
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/static/${cleanName}-Regular.ttf`,
                        // Strategy 4: Regular Direct Fallback
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}-Regular.ttf`,
                        // Strategy 5: Variable font naming
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}[wght].ttf`,
                        `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}-VariableFont_wght.ttf`
                    ];

                    for (let url of fontPaths) {
                        try {
                            const response = await fetch(url);
                            if (response.ok) return await response.arrayBuffer();
                        } catch (e) { continue; }
                    }
                    
                    throw new Error("All strategies failed");
                } catch (e) {
                    // LAST DESORT FALLBACK (Poppins)
                    return await fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/poppins/Poppins-Medium.ttf').then(res => res.arrayBuffer());
                }
            }

            // --- NEW VISUAL FONT DROPDOWN LOGIC ---
            const fontResults = document.getElementById('font-results');
            const fonts = [
                { name: "Poppins", sub: "Modern Sans" },
                { name: "Roboto", sub: "Clean Sans" },
                { name: "Montserrat", sub: "Bold Modern" },
                { name: "Oswald", sub: "Narrow Bold" },
                { name: "Cinzel", sub: "Ancient Serif" },
                { name: "Great Vibes", sub: "Formal Script" },
                { name: "Playfair Display", sub: "Elegant Serif" },
                { name: "Pacifico", sub: "Friendly Script" },
                { name: "Dancing Script", sub: "Dynamic Script" },
                { name: "Sacramento", sub: "Thin Script" },
                { name: "Orbitron", sub: "Cyber Future" }
            ];

            function renderFonts(filter = "") {
                fontResults.innerHTML = "";
                const filtered = fonts.filter(f => f.name.toLowerCase().includes(filter.toLowerCase()));
                filtered.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "font-option";
                    div.style.fontFamily = `'${f.name}', sans-serif`;
                    div.innerHTML = `<span>${f.sub}</span> ${f.name}`;
                    div.onclick = () => {
                        fontChoice.value = f.name;
                        fontResults.style.display = "none";
                        updatePreview();
                    };
                    fontResults.appendChild(div);
                });
            }

            fontChoice.onfocus = () => { renderFonts(fontChoice.value); fontResults.style.display = "block"; };
            fontChoice.oninput = () => renderFonts(fontChoice.value);
            document.addEventListener('click', (e) => {
                if (!fontChoice.contains(e.target) && !fontResults.contains(e.target)) {
                    fontResults.style.display = "none";
                }
            });

            upload.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    templateBytes = await file.arrayBuffer();
                    generateBtn.disabled = false;
                    updatePreview();
                }
            });

            async function updatePreview() {
                if (!templateBytes) return;
                const names = nameList.value.split('\n').filter(n => n.trim() !== "");
                const testName = nameList.value.split('\n')[0] || "Sample Name";
                const testDate = issueDateInput.value;
                const testId = generateUniqueId();

                // Build absolute URL for verification (Targeting shorter v.html)
                const verifyUrl = `${window.location.origin}${window.location.pathname.replace('cert-gen.html', 'v.html')}?i=${testId}&n=${encodeURIComponent(testName)}`;

                try {
                    const pdfDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                    pdfDoc.registerFontkit(fontkit);
                    const fontBytes = await loadFont();
                    let customFont = fontBytes ? await pdfDoc.embedFont(fontBytes) : null;

                    const page = pdfDoc.getPages()[0];
                    const { width, height } = page.getSize();
                    const textColor = hexToPdfRgb(fontColor.value);

                    // Drawing Helper
                    const drawField = (text, config) => {
                        if (!text) return;
                        const tw = customFont ? customFont.widthOfTextAtSize(text, config.s) : text.length * (config.s * 0.5);
                        const cx = (width / 2) - (tw / 2) + config.x;
                        page.drawText(text, {
                            x: cx,
                            y: height - config.y,
                            size: config.s,
                            font: customFont,
                            color: textColor
                        });
                    };

                    const mode = certMode.value;
                    drawField(testName, layout.name);
                    if (mode === 'participation') drawField(testDate, layout.date);
                    if (mode === 'coordinator') drawField(roleInput.value, layout.role);
                    if (mode !== 'ticket') drawField(testId, layout.id);

                    // DRAW QR CODE
                    const qrBase64 = await generateQRImage(verifyUrl, layout.qr.s);
                    if (qrBase64) {
                        const qrImage = await pdfDoc.embedPng(qrBase64);
                        const qx = (width / 2) - (layout.qr.s / 2) + layout.qr.x;
                        page.drawImage(qrImage, {
                            x: qx,
                            y: height - layout.qr.y - layout.qr.s,
                            width: layout.qr.s,
                            height: layout.qr.s
                        });
                    }

                    const pdfBytes = await pdfDoc.save({ useObjectStreams: false, addDefaultPage: false });
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const blobUrl = URL.createObjectURL(blob);
                    renderViaIframe(blobUrl);
                    status.innerText = "Preview Updated with QR System!";
                } catch (error) {
                    console.error(error);
                    status.innerText = "Preview Error: " + error.message;
                }
            }

            function renderViaIframe(url) {
                const boundary = document.getElementById('preview-boundary');
                const oldIframe = boundary.querySelector('iframe');
                if (oldIframe && oldIframe.src.startsWith('blob:')) {
                    URL.revokeObjectURL(oldIframe.src);
                }
                boundary.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none; background: #fff;"></iframe>`;
            }

            [ySlider, xSlider, sizeSlider, nameList, fontChoice].forEach(el => {
                el.addEventListener('input', () => {
                    clearTimeout(window.previewTimeout);
                    window.previewTimeout = setTimeout(updatePreview, 500);
                });
            });

            generateBtn.addEventListener('click', async () => {
                const names = nameList.value.split('\n').filter(n => n.trim() !== "");
                if (names.length === 0) return alert("Enter names.");

                status.innerText = "🚀 Starting Industrial Mass Generation...";
                generateBtn.disabled = true;
                const zip = new JSZip();

                try {
                    const fontBytes = await loadFont();
                    const textColor = hexToPdfRgb(fontColor.value);

                    for (let i = 0; i < names.length; i++) {
                        const name = names[i];
                        const date = issueDateInput.value;
                        const role = roleInput.value;
                        const certId = generateUniqueId();
                        const verifyUrl = `${window.location.origin}${window.location.pathname.replace('cert-gen.html', 'v.html')}?i=${certId}&n=${encodeURIComponent(name)}`;

                        // SAVE TO CLOUD (GCP FIRESTORE)
                        if (db) {
                            try {
                                await db.collection("certificates").doc(certId).set({
                                    id: certId,
                                    name: name,
                                    role: role,
                                    date: date,
                                    issuedAt: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            } catch (e) { console.error("Cloud Sync Error:", e); }
                        }

                        status.innerText = `🔄 Processing Cert ${i + 1}/${names.length}: ${name}`;

                        const tempDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                        tempDoc.registerFontkit(fontkit);
                        const customFont = fontBytes ? await tempDoc.embedFont(fontBytes) : null;

                        tempDoc.setTitle(`Verified Certificate - ${name}`);
                        tempDoc.setAuthor('Trojan Club');
                        tempDoc.setSubject('Official Tech Wizard 2.0 Credential');
                        tempDoc.setCreator('Tech Wizard Engine');
                        tempDoc.setProducer('Tech Wizard 2.0 Studio');
                        tempDoc.setCreationDate(new Date());
                        tempDoc.setModificationDate(new Date());

                        const page = tempDoc.getPages()[0];
                        const { width, height } = page.getSize();

                        // DRAWING ALL FIELDS
                        const drawField = (text, config) => {
                            if (!text) return;
                            const tw = customFont ? customFont.widthOfTextAtSize(text, config.s) : text.length * (config.s * 0.5);
                            const cx = (width / 2) - (tw / 2) + config.x;
                            page.drawText(text, { x: cx, y: height - config.y, size: config.s, font: customFont, color: textColor });
                        };

                        const mode = certMode.value;
                        drawField(name, layout.name);
                        if (mode === 'participation') drawField(date, layout.date);
                        if (mode === 'coordinator') drawField(role, layout.role);
                        if (mode !== 'ticket') drawField(certId, layout.id);

                        // EMBED QR
                        const qrBase64 = await generateQRImage(verifyUrl, layout.qr.s);
                        if (qrBase64) {
                            const qrImage = await tempDoc.embedPng(qrBase64);
                            const qx = (width / 2) - (layout.qr.s / 2) + layout.qr.x;
                            page.drawImage(qrImage, { x: qx, y: height - layout.qr.y - layout.qr.s, width: layout.qr.s, height: layout.qr.s });
                        }

                        const pdfBytes = await tempDoc.save({ useObjectStreams: false, addDefaultPage: false });
                        // JSZip auto-detects Uint8Array, no binary flag needed
                        zip.file(`TW2_Verified_${name}.pdf`, pdfBytes);
                    }

                    status.innerText = "📦 Finalizing Industrial Package...";
                    // Use DEFLATE to create a standard, compressed zip (helps bypass some OS security checks)
                    const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
                    download(zipBlob, "TW2_Verified_Certificates.zip", "application/zip");
                    status.innerText = "✅ ALL CERTIFICATES GENERATED SUCCESSFULLY!";
                } catch (err) {
                    console.error(err);
                    status.innerText = "❌ Generation Error: " + err.message;
                } finally {
                    generateBtn.disabled = false;
                }
            });

            function download(data, filename, type) {
                const file = new Blob([data], { type: type });
                const a = document.createElement("a"), url = URL.createObjectURL(file);
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 0);
            }

            // --- NEW DRAGGABLE & RETRACTABLE DIVIDER LOGIC ---
            const sidebar = document.getElementById('sidebar');
            const resizer = document.getElementById('drag-handle');
            const expandBtn = document.getElementById('expand-btn');

            function toggleSidebar() {
                const isCollapsed = sidebar.classList.toggle('collapsed');
                expandBtn.style.display = isCollapsed ? 'flex' : 'none';
                resizer.style.display = isCollapsed ? 'none' : 'block';

                // Adjust expand button position dynamically
                if (isCollapsed) {
                    expandBtn.style.left = '0';
                } else {
                    expandBtn.style.left = sidebar.offsetWidth + 'px';
                }
            }

            let isResizing = false;
            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                resizer.classList.add('dragging');
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                let newWidth = e.clientX;
                if (newWidth >= 250 && newWidth <= 600) {
                    sidebar.style.width = newWidth + 'px';
                    // Update expand button position
                    expandBtn.style.left = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                isResizing = false;
                document.body.style.cursor = 'default';
                resizer.classList.remove('dragging');
            });
        </script>
</body>
