<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | Tech Wizard 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --dark-bg: #050510;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 45, 120, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.05) 0%, transparent 40%);
        }

        canvas#bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .verify-container {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 245, 255, 0.03);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .verify-btn {
            width: 100%;
            padding: 16px;
            background: var(--neon-cyan);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 245, 255, 0.3);
            filter: brightness(1.1);
        }

        /* Result Styles */
        #result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-box {
            background: rgba(0, 255, 128, 0.05);
            border: 1px solid rgba(0, 255, 128, 0.2);
        }

        .error-box {
            background: rgba(255, 45, 120, 0.05);
            border: 1px solid rgba(255, 45, 120, 0.2);
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .success-box .status-icon { color: #00ff80; }
        .error-box .status-icon { color: var(--neon-pink); }

        .cert-info {
            text-align: left;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-label { color: #888; }
        .info-value { color: #fff; font-weight: 600; }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="verify-container">
        <div class="logo-text">TECH WIZARD 2.0</div>
        <h1>Credential Verification</h1>
        
        <div id="search-interface">
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" id="cert-id" placeholder="Enter Certificate ID (e.g. TW.26-A1B2C3D) ">
            </div>
            <button class="verify-btn" onclick="performVerification()">Verify Authenticity</button>
        </div>

        <div id="result">
            <!-- Dynamic Content -->
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        // CRYPTOGRAPHIC VERIFICATION LOGIC (Matches Admin Tool)
        function verifyCertificate(id, name) {
            if (!id || !name) return false;
            
            // Re-calculate the hash
            let hash = 0;
            const secret = "TECHWIZARD_SECRET_KEY";
            const str = name + secret;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            const expectedIdTail = Math.abs(hash).toString(16).toUpperCase().substring(0, 8);
            
            // Check if the ID ends with this hash
            return id.endsWith(expectedIdTail);
        }

        function performVerification() {
            const inputId = document.getElementById('cert-id').value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const nameFromUrl = urlParams.get('n') || urlParams.get('name'); // Support both short and long

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            // IF name is in URL, we can verify instantly
            if (nameFromUrl) {
                const isValid = verifyCertificate(inputId, nameFromUrl);
                if (isValid) {
                    showSuccess(nameFromUrl, inputId);
                } else {
                    showError("Invalid Credential Signature.");
                }
            } else {
                showError("Manual verification requires full ID and Name. Please scan the QR code for instant verification.");
            }
        }

        function showSuccess(name, id) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'success-box';
            resultDiv.innerHTML = `
                <div class="status-icon"><i class="fas fa-check-circle"></i></div>
                <h3 style="color: #00ff80;">Official Certificate Verified</h3>
                <p style="margin-top: 10px; font-size: 0.9rem; color: #888;">This document is an authentic digital credential issued by the Haridwar University Tech Wizard 2.0 Organizing Committee.</p>
                <div class="cert-info">
                    <div class="info-row"><span class="info-label">Issued To:</span> <span class="info-value">${name}</span></div>
                    <div class="info-row"><span class="info-label">Credential ID:</span> <span class="info-value" style="color:var(--neon-cyan)">${id}</span></div>
                    <div class="info-row"><span class="info-label">Event:</span> <span class="info-value">Tech Wizard 2.0</span></div>
                    <div class="info-row"><span class="info-label">Verification Status:</span> <span class="info-value" style="color:#00ff80">✅ AUTHENTIC</span></div>
                </div>
            `;
        }

        function showError(msg) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'error-box';
            resultDiv.innerHTML = `
                <div class="status-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <h3 style="color: var(--neon-pink);">Verification Failed</h3>
                <p style="margin-top: 10px; font-size: 0.9rem;">${msg}</p>
            `;
        }

        // AUTO-VERIFY ON LOAD IF PARAMS EXIST
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('i') || urlParams.get('id'); // Support short and long
            const name = urlParams.get('n') || urlParams.get('name');

            if (id && name) {
                document.getElementById('cert-id').value = id;
                performVerification();
            }
        };

        // Particles Effect
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 245, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
