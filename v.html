<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | Tech Wizard 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --dark-bg: #050510;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 45, 120, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.05) 0%, transparent 40%);
        }

        canvas#bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .verify-container {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 245, 255, 0.03);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .verify-btn {
            width: 100%;
            padding: 16px;
            background: var(--neon-cyan);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 245, 255, 0.3);
            filter: brightness(1.1);
        }

        /* Result Styles */
        #result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-box {
            background: rgba(0, 255, 128, 0.05);
            border: 1px solid rgba(0, 255, 128, 0.2);
        }

        .error-box {
            background: rgba(255, 45, 120, 0.05);
            border: 1px solid rgba(255, 45, 120, 0.2);
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .success-box .status-icon { color: #00ff80; }
        .error-box .status-icon { color: var(--neon-pink); }

        .cert-info {
            text-align: left;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-label { color: #888; }
        .info-value { color: #fff; font-weight: 600; }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="verify-container">
        <div class="logo-text">TECH WIZARD 2.0</div>
        <h1>Credential Verification</h1>
        
        <div id="search-interface">
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" id="cert-id" placeholder="Enter Certificate ID (e.g. TW.26-A1B2C3D) ">
            </div>
            <button class="verify-btn" onclick="performVerification()">Verify Authenticity</button>
        </div>

        <div id="result">
            <!-- Dynamic Content -->
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- FIREBASE CLOUD (GCP) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // TODO: Paste the same Config here from cert-gen.html!
        const firebaseConfig = {
            apiKey: "AIzaSyDPYXHwl4i0gNWJEzHwaN9UdesBdSwWQKU",
            authDomain: "tech-wizard-certificates.firebaseapp.com",
            projectId: "tech-wizard-certificates",
            storageBucket: "tech-wizard-certificates.firebasestorage.app",
            messagingSenderId: "1058371501731",
            appId: "1:1058371501731:web:0d3c8cde0086e0027a0916"
        };
        
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch(e) { console.warn("Cloud connection not ready."); }

        async function performVerification() {
            const inputId = document.getElementById('cert-id').value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const nameFromUrl = urlParams.get('n') || urlParams.get('name');

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div style="color:var(--neon-cyan)">Searching Official Cloud Records...</div>';

            // 1. CLOUD VERIFICATION (The Truth)
            if (db && inputId) {
                try {
                    const doc = await db.collection("certificates").doc(inputId).get();
                    if (doc.exists) {
                        const data = doc.data();
                        // Verify name matches or is similar
                        if (data.name.toLowerCase() === (nameFromUrl || "").toLowerCase() || !nameFromUrl) {
                            showSuccess(data.name, inputId, data.date);
                            return;
                        }
                    }
                } catch(e) { console.error("Cloud Error:", e); }
            }

            // 2. FALLBACK/ERROR
            showError("Credential not found in our official database. Please ensure the ID is correct.");
        }

        function showSuccess(name, id, date) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'success-box';
            resultDiv.innerHTML = `
                <div class="status-icon"><i class="fas fa-check-circle"></i></div>
                <h3 style="color: #00ff80;">Official Certificate Verified</h3>
                <div class="cert-info">
                    <div class="info-row"><span class="info-label">Issued To:</span> <span class="info-value">${name}</span></div>
                    <div class="info-row"><span class="info-label">Credential ID:</span> <span class="info-value" style="color:var(--neon-cyan)">${id}</span></div>
                    <div class="info-row"><span class="info-label">Issue Date:</span> <span class="info-value">${date || "N/A"}</span></div>
                    <div class="info-row"><span class="info-label">Status:</span> <span class="info-value" style="color:#00ff80">✅ AUTHENTIC CLOUD RECORD</span></div>
                </div>
            `;
        }

        function showError(msg) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'error-box';
            resultDiv.innerHTML = `
                <div class="status-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <h3 style="color: var(--neon-pink);">Verification Failed</h3>
                <p style="margin-top: 10px; font-size: 0.9rem;">${msg}</p>
            `;
        }

        // AUTO-VERIFY ON LOAD IF PARAMS EXIST
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('i') || urlParams.get('id'); // Support short and long
            const name = urlParams.get('n') || urlParams.get('name');

            if (id && name) {
                document.getElementById('cert-id').value = id;
                performVerification();
            }
        };

        // Particles Effect
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 245, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
